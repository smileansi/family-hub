# 외부/내부 접속 통합
server {
    listen 80;
    server_name smileansi.com www.smileansi.com smileansi.ddns.net www.smileansi.ddns.net localhost 192.168.219.200;

    location = /favicon.ico { access_log off; log_not_found off; }

    # API 요청 → Flask (5000)
    location /api/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:5000;
    }

    # smileansi.com/family (슬래시 없음) → 슬래시 포함으로 리다이렉트
    location = /family {
        return 301 /family/;
    }

    # smileansi.com/family/ → family-hub 앱
    # nginx가 /family/ prefix를 제거하고 / 로 전달하므로 앱 코드 변경 불필요
    location /family/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/home/smileansi/family-hub/family-hub/family-hub.sock:/;
    }

    # 루트 경로 → 랜딩 페이지 (정적 파일)
    location / {
        root /home/smileansi/family-hub/family-hub/landing;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# 서버 로컬 테스트 (127.0.0.1:5000)
server {
    listen 5000;
    server_name localhost 127.0.0.1;

    location = /favicon.ico { access_log off; log_not_found off; }

    location / {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/home/smileansi/family-hub/family-hub/family-hub.sock:/;
    }
}
