# 외부 접속 (smileansi.ddns.net) - 포트 80
server {
    listen 80;
    server_name smileansi.com www.smileansi.com smileansi.ddns.net www.smileansi.ddns.net localhost 192.168.219.200;

    location = /favicon.ico { access_log off; log_not_found off; }

    # API 요청을 5000으로 프록시 + CORS 헤더 추가
    location /api/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:5000;
        
        # CORS 헤더 추가
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # 나머지 요청은 gunicorn으로
    location / {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/home/smileansi/family-hub/family-hub/family-hub.sock:/;
    }
}

# 서버 로컬 테스트 (127.0.0.1:5000)
server {
    listen 5000;
    server_name localhost 127.0.0.1;

    location = /favicon.ico { access_log off; log_not_found off; }

    location / {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/home/smileansi/family-hub/family-hub/family-hub.sock:/;
    }
}
