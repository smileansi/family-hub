server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    location = /favicon.ico { access_log off; log_not_found off; }

    location / {
        include proxy_params;
        proxy_pass http://unix:/home/youruser/family-hub/family-hub.sock;
    }
}[Unit]
Description=Family Hub Gunicorn Server
After=network.target

[Service]
User=youruser
Group=youruser
WorkingDirectory=/home/youruser/family-hub
Environment="PATH=/home/youruser/family-hub/venv/bin"
ExecStart=/home/youruser/family-hub/venv/bin/gunicorn --workers 3 --bind unix:family-hub.sock -m 007 server:app
Restart=always

[Install]
WantedBy=multi-user.target</content>
